<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Fundo gradiente ciano -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00b8d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D9E75;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Padrão decorativo -->
  <circle cx="100" cy="100" r="150" fill="rgba(255,255,255,0.05)"/>
  <circle cx="1100" cy="530" r="200" fill="rgba(255,255,255,0.05)"/>
  <circle cx="600" cy="315" r="250" fill="rgba(255,255,255,0.03)"/>
  
  <!-- Logo grande -->
  <text x="600" y="250" font-family="'Syne', sans-serif" font-size="120" font-weight="800" 
        fill="#0A0A0A" text-anchor="middle" filter="url(#glow)">
    vuno<tspan font-style="italic" fill="#FAFAF5">studio</tspan>
  </text>
  
  <!-- Tagline -->
  <text x="600" y="340" font-family="'Syne', sans-serif" font-size="36" font-weight="600" 
        fill="#0A0A0A" text-anchor="middle" opacity="0.9">
    Presença Digital &amp; Comunicação Visual
  </text>
  
  <!-- Subline -->
  <text x="600" y="420" font-family="'Syne', sans-serif" font-size="28" font-weight="500" 
        fill="#FAFAF5" text-anchor="middle">
    Transformamos sua marca em experiência digital
  </text>
  
  <!-- URL -->
  <text x="600" y="520" font-family="'Syne', sans-serif" font-size="24" font-weight="700" 
        fill="#0A0A0A" text-anchor="middle" opacity="0.7">
    www.vunostudio.com.br
  </text>
</svg>
